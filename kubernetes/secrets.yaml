apiVersion: v1
kind: Secret
metadata:
  name: healthcare-secrets
  namespace: healthcare
type: Opaque
stringData:
  # Database URLs
  patient-db-url: mongodb://patient-db-service:27017/patientdb
  doctor-db-url: mongodb://doctor-db-service:27017/doctordb
  appointment-db-url: mongodb://appointment-db-service:27017/appointmentdb
  payment-db-url: mongodb://payment-db-service:27017/paymentdb
  notification-db-url: mongodb://notification-db-service:27017/notificationdb
  ai-db-url: mongodb://ai-symptom-checker-db-service:27017/aisymptomdb
  
  # JWT Secret
  jwt-secret: your-super-secret-jwt-key-change-in-production-2026
  
  # RabbitMQ
  rabbitmq-url: amqp://admin:admin123@rabbitmq-service:5672
  
  # Payment Gateway (PayHere/Stripe)
  payhere-merchant-id: your_merchant_id_here
  stripe-secret-key: sk_test_your_stripe_test_key_here
  
  # Email Configuration (Gmail example)
  email-user: healthcare.notification@gmail.com
  email-pass: your_app_specific_password
  
  # Twilio SMS (Optional)
  twilio-account-sid: your_twilio_account_sid
  twilio-auth-token: your_twilio_auth_token
  twilio-phone-number: +1234567890
  
  # OpenAI API Key (for AI Symptom Checker)
  openai-api-key: sk-your_openai_api_key_here