apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service-deployment
  labels:
    app: patient-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
      - name: patient-service
        # TODO: Replace 'kalana' with your actual Docker image name
        image: kalana/patient-service:latest
        ports:
        - containerPort: 3001
        
        # A+ Feature: Resource Management prevents "Noisy Neighbors"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"  # 1/10th of a CPU core
          limits:
            memory: "512Mi"
            cpu: "250m"  # 1/4th of a CPU core
            
        env:
        - name: PORT
          value: "3001"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: healthcare-secrets
              key: patient-db-url
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
spec:
  selector:
    app: patient-service
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001