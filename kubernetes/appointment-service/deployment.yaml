apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service-deployment
  namespace: healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
      - name: appointment-service
        image: kalana/appointment-service:latest
        ports:
        - containerPort: 3003
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        env:
        - name: PORT
          value: "3003"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: healthcare-secrets
              key: appointment-db-url
        - name: PATIENT_SERVICE_URL
          value: "http://patient-service:3001"
        - name: DOCTOR_SERVICE_URL
          value: "http://doctor-service:3002"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: healthcare
spec:
  selector:
    app: appointment-service
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003