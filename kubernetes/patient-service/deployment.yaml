apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service-deployment
  namespace: healthcare
  labels:
    app: patient-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
        tier: backend
    spec:
      containers:
      - name: patient-service
        image: kalana/patient-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: PORT
          value: "3001"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: healthcare-secrets
              key: patient-db-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: healthcare-secrets
              key: jwt-secret
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: healthcare
  labels:
    app: patient-service
spec:
  selector:
    app: patient-service
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
      name: http