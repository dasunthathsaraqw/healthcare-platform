# PersistentVolumeClaim for AI Symptom Checker Database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-symptom-checker-db-pvc
  namespace: healthcare
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# Deployment for AI Symptom Checker Database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-checker-db
  namespace: healthcare
  labels:
    app: ai-symptom-checker-db
    service: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-checker-db
  template:
    metadata:
      labels:
        app: ai-symptom-checker-db
        service: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
          name: mongodb
        env:
        - name: MONGO_INITDB_DATABASE
          value: "aisymptomdb"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        volumeMounts:
        - name: ai-symptom-checker-db-storage
          mountPath: /data/db
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: ai-symptom-checker-db-storage
        persistentVolumeClaim:
          claimName: ai-symptom-checker-db-pvc
---
# Service for AI Symptom Checker Database
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-checker-db-service
  namespace: healthcare
  labels:
    app: ai-symptom-checker-db
spec:
  selector:
    app: ai-symptom-checker-db
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
      name: mongodb
  clusterIP: None