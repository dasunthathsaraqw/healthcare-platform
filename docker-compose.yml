services:
  # Databases
  patient-db:
    image: mongo:latest
    container_name: patient-db
    ports:
      - "27017:27017"
    volumes:
      - patient-data:/data/db
    networks:
      - healthcare-network

  doctor-db:
    image: mongo:latest
    container_name: doctor-db
    ports:
      - "27018:27017"
    volumes:
      - doctor-data:/data/db
    networks:
      - healthcare-network

  appointment-db:
    image: mongo:latest
    container_name: appointment-db
    ports:
      - "27019:27017"
    volumes:
      - appointment-data:/data/db
    networks:
      - healthcare-network

  payment-db:
    image: mongo:latest
    container_name: payment-db
    ports:
      - "27020:27017"
    volumes:
      - payment-data:/data/db
    networks:
      - healthcare-network

  notification-db:
    image: mongo:latest
    container_name: notification-db
    ports:
      - "27021:27017"
    volumes:
      - notification-data:/data/db
    networks:
      - healthcare-network

  ai-symptom-checker-db:
    image: mongo:latest
    container_name: ai-symptom-checker-db
    ports:
      - "27022:27017"
    volumes:
      - ai-symptom-checker-data:/data/db
    networks:
      - healthcare-network
  # Backend Services
  patient-service:
    build: ./services/patient-service
    container_name: patient-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_URL=mongodb://patient-db:27017/patientdb
      - NODE_ENV=development
    depends_on:
      - patient-db
    networks:
      - healthcare-network

  doctor-service:
    build: ./services/doctor-service
    container_name: doctor-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DB_URL=mongodb://doctor-db:27017/doctordb
      - NODE_ENV=development
    depends_on:
      - doctor-db
    networks:
      - healthcare-network

  appointment-service:
    build: ./services/appointment-service
    container_name: appointment-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DB_URL=mongodb://appointment-db:27017/appointmentdb
      - PATIENT_SERVICE_URL=http://patient-service:3001
      - DOCTOR_SERVICE_URL=http://doctor-service:3002
      - NODE_ENV=development
    depends_on:
      - appointment-db
      - patient-service
      - doctor-service
    networks:
      - healthcare-network

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - DB_URL=mongodb://payment-db:27017/paymentdb
      - APPOINTMENT_SERVICE_URL=http://appointment-service:3003
      - NODE_ENV=development
    depends_on:
      - payment-db
      - appointment-service
    networks:
      - healthcare-network

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - DB_URL=mongodb://notification-db:27017/notificationdb
      - NODE_ENV=development
    depends_on:
      - notification-db
    networks:
      - healthcare-network

  ai-symptom-checker:
    build: ./services/ai-symptom-checker-service
    container_name: ai-symptom-checker-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - NODE_ENV=development
    networks:
      - healthcare-network

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PATIENT_SERVICE=http://patient-service:3001
      - DOCTOR_SERVICE=http://doctor-service:3002
      - APPOINTMENT_SERVICE=http://appointment-service:3003
      - PAYMENT_SERVICE=http://payment-service:3004
      - NOTIFICATION_SERVICE=http://notification-service:3005
      - AI_SYMPTOM_CHECKER=http://ai-symptom-checker:3006
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - patient-service
      - doctor-service
      - appointment-service
      - payment-service
      - notification-service
      - ai-symptom-checker
    networks:
      - healthcare-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - healthcare-network

networks:
  healthcare-network:
    driver: bridge

volumes:
  patient-data:
  doctor-data:
  appointment-data:
  payment-data:
  notification-data:
  ai-symptom-checker-data:
